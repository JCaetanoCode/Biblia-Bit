<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bíblia Bit</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header id="title">Bíblia Bit</header>

<!-- 🔎 BUSCA -->
<div style="padding:10px;">
    <input id="buscaInput" placeholder="Buscar na Bíblia...">
    <button onclick="buscar()" style="margin-top:5px;">Buscar</button>
</div>

<div class="container">

    <!-- MENU VERSÃO -->
    <div id="menuVersao">
        <button onclick="carregar('acf.json')">Almeida Corrigida e Fiel (ACF)</button>
        <button onclick="carregar('aa.json')">Almeida Atualizada (AA)</button>
        <button onclick="carregar('nvi.json')">Nova Versão Internacional NVI</button>
    </div>

    <!-- TESTAMENTO -->
    <div id="menuTestamento" class="content">
        <button class="back" onclick="voltarVersao()">⬅ Voltar para versões</button>

        <button onclick="abrirTestamento('antigo')">Antigo Testamento</button>
        <button onclick="abrirTestamento('novo')">Novo Testamento</button>
    </div>

    <!-- LIVROS -->
    <div id="menuLivros" class="content"></div>

    <!-- CAPÍTULOS -->
    <div id="menuCapitulos" class="content"></div>

    <!-- LEITURA -->
    <div id="leitura" class="content"></div>

    <!-- RESULTADO BUSCA -->
    <div id="resultadoBusca" class="content"></div>

</div>

<script src="script.js"></script>
</body>
</html>
